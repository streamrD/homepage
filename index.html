<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todd Stabley</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Special+Elite&family=Share+Tech+Mono&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #0a0a0a;
      color: #c8c8c8;
      font-family: 'Share Tech Mono', 'Courier New', monospace;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      padding: 40px 60px;
      min-height: 100vh;
    }

    .hero {
      position: relative;
      width: 100%;
      max-width: 700px;
      margin-bottom: 28px;
    }

    .hero img {
      width: 100%;
      display: block;
      border-radius: 4px;
      /* slight aged-film vignette */
      box-shadow:
        inset 0 0 60px rgba(0,0,0,0.6),
        0 0 0 6px #0a0a0a;
    }

    .hero-caption {
      position: absolute;
      bottom: 12px;
      right: 16px;
      font-size: 11px;
      letter-spacing: 0.12em;
      color: rgba(220, 210, 190, 0.85);
      font-family: 'Share Tech Mono', monospace;
      text-transform: uppercase;
    }

    .hero-title {
      position: absolute;
      bottom: 60px;
      left: 20px;
      line-height: 1;
    }

    .hero-title .name {
      font-family: 'Special Elite', serif;
      font-size: 38px;
      color: rgba(210, 195, 170, 0.9);
      display: block;
      letter-spacing: 0.04em;
    }

    .hero-title .word-home {
      font-family: 'Special Elite', serif;
      font-size: 38px;
      color: rgba(180, 100, 60, 0.88);
      display: block;
      letter-spacing: 0.04em;
      margin-top: -4px;
    }

    nav {
      margin-top: 4px;
      padding-left: 4px;
    }

    nav ul {
      list-style: none;
      padding: 0;
    }

    nav ul li {
      display: flex;
      align-items: center;
      margin-bottom: 6px;
    }

    nav ul li::before {
      content: '·';
      margin-right: 12px;
      color: #666;
      font-size: 18px;
      line-height: 1;
    }

    nav ul li a {
      text-decoration: none;
      color: #a0a8b0;
      font-size: 13px;
      letter-spacing: 0.18em;
      text-transform: lowercase;
      transition: color 0.2s ease;
    }

    nav ul li a:hover {
      color: #d4c4a8;
    }
  </style>
</head>
<body>

  <div class="hero">
    <!-- Replace the src with your Backblaze image URL once uploaded -->
    <img src="https://stabley-homepage.s3.us-east-005.backblazeb2.com/detroit750.jpg" alt="Detroit neighborhood, c. 1964 — Moore Archives">
    <div class="hero-title">
      <span class="name">Todd Stabley</span>
      <span class="word-home">home</span>
    </div>
    <div class="hero-caption">Detroit, c. 1964 &nbsp;from moore archives</div>
  </div>

  <nav>
    <ul>
      <li><a href="https://twitter.com/yourusername">6,684 Feet: 10 Years with Mt. Mitchell</a></li>
      <li><a href="https://quo.up.railway.app/">Cat Photos</a></li>
      <li><a href="https://metaphysics.up.railway.app/">Metaphysical Essays</a></li>
      <li><a href="https://streamrd.github.io/keys/">A True Dream about Key West</a></li>
      <li><a href="https://procyclingresults.up.railway.app/">Pro Cycling Race Result Aggregator</a></li>
      <li><a href="https://www.strava.com/athletes/8914">Strava</a></li>
      <li><a href="https://www.youtube.com/@ToddStabley">YouTube</a></li>
    </ul>
  </nav>

</body>
</html>
