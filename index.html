<!DOCTYPE html>

<head>
  <meta charset="UTF-8">

  <title>Todd Stabley</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Special+Elite&family=Share+Tech+Mono&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #0a0a0a;
      color: #c8c8c8;
      font-family: 'Share Tech Mono', 'Courier New', monospace;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      padding: 40px 60px;
      min-height: 100vh;
    }

    .hero {
      position: relative;
      width: 100%;
      max-width: 700px;
      margin-bottom: 28px;
    }

    .hero img {
      width: 100%;
      display: block;
      border-radius: 4px;
      /* slight aged-film vignette */
      box-shadow:
        inset 0 0 60px rgba(0,0,0,0.6),
        0 0 0 6px #0a0a0a;
    }

    nav {
      margin-top: 4px;
      padding-left: 4px;
    }

    nav ul {
      list-style: none;
      padding: 0;
    }

    nav ul li {
      display: flex;
      align-items: center;
      margin-bottom: 6px;
    }

    nav ul li::before {
      content: '·';
      margin-right: 12px;
      color: #666;
      font-size: 18px;
      line-height: 1;
    }

    nav ul li a {
      text-decoration: none;
      color: #a0a8b0;
      font-size: 13px;
      letter-spacing: 0.18em;
      text-transform: lowercase;
      transition: color 0.2s ease;
    }

    nav ul li a:hover {
      color: #d4c4a8;
    }
  </style>
